# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Online Fraud Detection Continuous Integration (CI)

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install check dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src scripts main.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Compile source
      run: |
        python -m compileall src scripts main.py

  docker:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build training image
        run: |
          docker build -t fraud-detection-training:ci .

      - name: Run tests inside Docker image
        run: |
          docker run --rm fraud-detection-training:ci pytest
